<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0877ff" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Panel comercial de Distrito Streaming - compra, vende y gestiona cuentas de streaming." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/distrito-angel-blue-v1.png" />
  <title>Distrito Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f8ff;--panel:#fff;--soft:#f8fbff;--line:#d8e6f8;--text:#111827;--muted:#60718c;
      --blue:#0877ff;--blue2:#0057dc;--cyan:#27c2ff;--ok:#12a454;--warn:#f59e0b;--bad:#ef4444;
      --shadow:0 12px 32px rgba(19,50,92,.08);--shadow2:0 20px 56px rgba(8,119,255,.16);
      --radius:16px;--radius-sm:12px;--radius-lg:22px;
    }
    body.dark{
      --bg:#071526;--panel:#0d1d31;--soft:#12253b;--line:#1e3652;--text:#eef6ff;--muted:#8da0b8;
      --shadow:0 16px 48px rgba(0,0,0,.28);--shadow2:0 24px 64px rgba(8,119,255,.12);
      color-scheme:dark
    }
    *{box-sizing:border-box;margin:0}
    ::selection{background:rgba(8,119,255,.25);color:var(--text)}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(8,119,255,.25);border-radius:999px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(8,119,255,.4)}
    body{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit;border:0}
    button{cursor:pointer;transition:all .18s ease}
    button:disabled{cursor:not-allowed;opacity:.5}
    a{color:var(--blue);text-decoration:none;font-weight:700;transition:color .15s}
    img{max-width:100%;display:block}
    .muted{color:var(--muted)}
    .hide{display:none!important}

    .app-bg{min-height:100vh;background:linear-gradient(110deg,rgba(255,255,255,.6),rgba(229,240,255,.7)),radial-gradient(circle at 92% 0,rgba(8,119,255,.12),transparent 32%),radial-gradient(circle at 16% 88%,rgba(39,194,255,.08),transparent 28%),var(--bg)}
    body.dark .app-bg{background:radial-gradient(circle at 90% 0,rgba(8,119,255,.14),transparent 34%),radial-gradient(circle at 12% 88%,rgba(39,194,255,.07),transparent 28%),var(--bg)}

    .login{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:32px;padding:28px;overflow:hidden}
    .login-visual{height:calc(100vh - 56px);min-height:580px;border-radius:28px;overflow:hidden;background:#eef6ff;box-shadow:var(--shadow2);animation:heroIn .7s cubic-bezier(.2,.8,.2,1) both}
    .login-visual img{width:100%;height:100%;object-fit:cover}
    .login-panel{width:min(520px,100%);justify-self:center;background:rgba(255,255,255,.92);border:1px solid rgba(216,230,248,.9);border-radius:var(--radius-lg);box-shadow:var(--shadow2);padding:40px 36px 32px;backdrop-filter:blur(12px);animation:loginIn .55s cubic-bezier(.2,.8,.2,1) both}
    body.dark .login-panel{background:rgba(13,29,49,.92);border-color:rgba(30,54,82,.6)}
    body.dark .login-visual{background:#071526}
    body.dark .login-visual:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,21,38,.12),rgba(7,21,38,.35));pointer-events:none}
    .login-brand{display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:20px}
    .brand-logo{width:56px;height:56px;border-radius:16px;object-fit:cover;box-shadow:0 14px 28px rgba(8,119,255,.18);background:#eaf4ff}
    .brand-title{font-weight:1000;font-size:28px;line-height:.9}
    .brand-title em{display:block;color:var(--blue);font-style:italic}
    .login-panel h1{text-align:center;font-size:38px;line-height:1.05;margin-bottom:10px}
    .login-panel h1 span{color:var(--blue)}
    .login-panel>p{text-align:center;color:var(--muted);font-size:15px;margin-bottom:24px}
    .role-title{text-align:center;color:var(--blue);font-size:11px;font-weight:1000;letter-spacing:.14em;margin-bottom:8px}
    .role-toggle{display:grid;grid-template-columns:1fr 1fr;padding:6px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.6);box-shadow:inset 0 2px 8px rgba(15,23,42,.03)}
    body.dark .role-toggle{background:rgba(18,37,59,.8)}
    .role-toggle button{border:0;border-radius:13px;background:transparent;color:var(--muted);font-weight:900;padding:13px 10px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:14px;transition:all .2s ease}
    body.dark .role-toggle button{color:#8da0b8}
    .role-toggle button:hover:not(.active){background:var(--soft);color:var(--text)}
    .role-toggle button.active{background:linear-gradient(135deg,#2ca0ff,#0057dc);color:#fff;box-shadow:0 12px 28px rgba(8,119,255,.25)}
    .field{height:52px;margin-top:14px;display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.7);padding:0 16px;box-shadow:0 6px 18px rgba(15,23,42,.03);transition:border-color .2s,box-shadow .2s}
    .field:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(8,119,255,.12)}
    body.dark .field{background:rgba(18,37,59,.85);border-color:#1e3652}
    body.dark .field svg,.body.dark .field .mini-ico svg{stroke:#4da6ff}
    .field svg,.mini-ico svg{width:18px;height:18px;stroke:var(--blue);flex-shrink:0}
    .mini-ico{display:inline-flex;align-items:center;justify-content:center;min-width:20px}
    .field input{width:100%;outline:0;background:transparent!important;color:var(--text);font-size:15px;-webkit-text-fill-color:var(--text);caret-color:var(--text)}
    body.dark .field input{background:rgba(18,37,59,.95)!important;-webkit-text-fill-color:#eef6ff!important;color:#eef6ff!important;caret-color:#eef6ff}
    .field input::placeholder{color:var(--muted);-webkit-text-fill-color:var(--muted)}
    input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,textarea:-webkit-autofill,select:-webkit-autofill{-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--panel) inset!important;transition:background-color 5000s ease-in-out 0s}
    body.dark input:-webkit-autofill,body.dark input:-webkit-autofill:hover,body.dark input:-webkit-autofill:focus,body.dark textarea:-webkit-autofill,body.dark select:-webkit-autofill{-webkit-text-fill-color:#eef6ff!important;-webkit-box-shadow:0 0 0 1000px rgba(13,29,49,.95) inset!important;background-color:rgba(13,29,49,.95)!important;color:#eef6ff!important}
    .login-options{display:flex;justify-content:space-between;align-items:center;margin:14px 0 24px;font-size:13px;color:var(--muted)}
    .check{display:flex;gap:7px;align-items:center}
    .check input[type=checkbox]{accent-color:var(--blue);width:16px;height:16px}
    .primary,.ghost,.danger-btn,.ok-btn{border:0;border-radius:var(--radius);font-weight:1000;padding:12px 16px;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;font-size:14px;transition:transform .15s,box-shadow .15s}
    .primary{background:linear-gradient(135deg,#2ca0ff,#0057dc);color:#fff;box-shadow:0 12px 24px rgba(8,119,255,.22);position:relative;overflow:hidden}
    .primary::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transition:left .5s ease}
    .primary:hover{transform:translateY(-1px);box-shadow:0 16px 32px rgba(8,119,255,.28)}
    .primary:hover::after{left:120%}
    .ghost{background:var(--panel);border:1px solid var(--line);color:var(--blue);transition:all .18s ease}
    .ghost:hover{background:rgba(8,119,255,.06);border-color:rgba(8,119,255,.3);transform:translateY(-1px)}
    .danger-btn{background:#fff6ed;border:1px solid #ffd6ad;color:#e65100}
    body.dark .danger-btn{background:rgba(50,27,16,.6);border-color:rgba(107,52,20,.5);color:#ffb36e}
    .ok-btn{background:#12a454;color:#fff;box-shadow:0 12px 24px rgba(18,164,84,.16)}
    .login-panel .primary{width:100%;height:56px;font-size:17px;border-radius:var(--radius)}
    .secure{text-align:center;color:var(--muted);font-weight:700;margin-top:16px;font-size:12px}

    .app{min-height:100vh;display:grid;grid-template-columns:250px 1fr}
    .side{position:sticky;top:0;height:100vh;background:rgba(255,255,255,.85);border-right:1px solid var(--line);padding:20px 14px;backdrop-filter:blur(16px);display:flex;flex-direction:column;z-index:10}
    body.dark .side{background:rgba(8,20,35,.9)}
    .side-brand{display:flex;align-items:center;gap:10px;padding:4px 6px 20px}
    .side-brand img{width:48px;height:48px;border-radius:14px;object-fit:cover}
    .side-brand b{font-size:19px;line-height:.95;display:block}
    .side-brand em{display:block;color:var(--blue);font-style:italic;font-weight:1000}
    .nav-title{font-size:11px;font-weight:1000;color:var(--muted);letter-spacing:.08em;margin:18px 8px 8px;text-transform:uppercase}
    .nav{display:grid;gap:6px}
    .nav button{border:0;background:transparent;color:var(--text);display:flex;align-items:center;gap:10px;padding:11px;border-radius:var(--radius);font-weight:800;text-align:left;font-size:14px;transition:all .18s ease;position:relative}
    .nav button svg{width:18px;height:18px;stroke:var(--blue);flex-shrink:0;transition:stroke .18s}
    .nav button.active{background:linear-gradient(135deg,#2aa0ff,#005be6);color:#fff;box-shadow:0 12px 26px rgba(8,119,255,.2)}
    .nav button.active::before{content:"";position:absolute;left:0;top:20%;bottom:20%;width:3px;background:#fff;border-radius:0 3px 3px 0}
    .nav button.active svg{stroke:#fff}
    .nav button:not(.active):hover{background:var(--soft);transform:translateX(3px)}
    .profile-card{margin-top:auto;border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);padding:10px;display:flex;align-items:center;gap:9px;box-shadow:0 10px 24px rgba(15,23,42,.04)}
    .avatar{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#2aa0ff,#005be6);color:#fff;display:grid;place-items:center;font-weight:1000;font-size:14px;flex-shrink:0}
    .profile-card button{margin-left:auto;width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:var(--soft);color:var(--blue);font-weight:1000;transition:all .18s}
    .profile-card button:hover{background:var(--blue);color:#fff;border-color:var(--blue)}

    .main{padding:22px;min-width:0;overflow-y:auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
    .top h1{margin-bottom:3px;font-size:26px}
    .top p{font-size:13px;color:var(--muted)}
    .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);padding:8px 14px;box-shadow:0 8px 20px rgba(15,23,42,.04);font-weight:900;display:inline-flex;align-items:center;gap:8px;min-height:42px;font-size:14px;transition:all .18s;white-space:nowrap;color:var(--text);overflow:visible}
    .pill:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(8,119,255,.1)}
    .pill small{display:block;color:var(--muted);font-weight:700;font-size:10px}
    .notice-dot{min-width:22px;height:22px;border-radius:999px;background:var(--blue);color:#fff;font-size:12px;display:grid;place-items:center;font-weight:1000;animation:dotPulse 2s ease-in-out infinite}
    @keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(8,119,255,.4)}50%{box-shadow:0 0 0 6px rgba(8,119,255,0)}}

    .section{margin-top:14px}
    .grid{display:grid;gap:12px}
    .metrics{grid-template-columns:repeat(4,1fr)}
    .metric{display:flex;align-items:center;gap:12px}
    .metric b{font-size:22px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:all .2s ease}
    .card:hover{box-shadow:0 16px 40px rgba(8,119,255,.08)}
    body.dark .card:hover{box-shadow:0 16px 40px rgba(0,0,0,.2),0 0 0 1px rgba(59,130,246,.08)}
    .card h2{font-size:18px;margin-bottom:4px}
    .quick{grid-template-columns:1.1fr repeat(4,1fr);align-items:stretch}
    .quick-intro{padding:14px 6px}
    .quick-btn{min-height:80px;border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);color:var(--text);font-weight:900;display:grid;place-items:center;gap:5px;transition:.18s;box-shadow:0 10px 22px rgba(15,23,42,.04);position:relative;overflow:hidden;font-size:13px}
    .quick-btn svg{width:24px;height:24px;stroke:var(--blue)}
    .quick-btn:hover{transform:translateY(-3px);box-shadow:0 16px 36px rgba(8,119,255,.14)}
    .quick-btn.primary-q{background:linear-gradient(135deg,#2aa0ff,#005be6);color:#fff}
    .quick-btn.primary-q svg{stroke:#fff}
    .quick-btn span{position:relative;z-index:1}

    .store-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
    .product{padding:0;overflow:hidden;border-radius:20px;position:relative;transition:.25s;background:linear-gradient(180deg,rgba(13,29,49,.9),rgba(7,21,38,.95));border:1px solid rgba(59,130,246,.15);backdrop-filter:blur(12px)}
    .product:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(8,119,255,.2),0 0 30px rgba(8,119,255,.08);border-color:rgba(59,130,246,.3)}
    .poster{height:auto;padding:24px 14px 8px;overflow:hidden;position:relative;background:transparent;display:flex;align-items:center;justify-content:center}
    .poster:before,.poster:after,.poster .svc,.poster .shine,.poster .brandmark{display:none}
    .poster .logo-word{position:relative;left:auto;right:auto;bottom:auto;margin:0 auto;width:fit-content;display:flex;align-items:center;justify-content:center}
    .poster .logo-word svg{width:130px;height:auto;max-height:70px}
    .poster .logo-word img{width:130px;height:auto;max-height:70px;object-fit:contain}
    .poster .stock{position:absolute;right:14px;top:14px;z-index:2;border-radius:10px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);padding:6px 12px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)}
    .product-body{padding:8px 20px 20px;text-align:center}
    .product h3{margin:0 0 4px;font-size:18px;font-weight:800;color:#fff}
    .product .mini{color:rgba(255,255,255,.5);font-size:11px;margin-bottom:12px;display:block}
    .product .price{font-size:28px;font-weight:1000;color:#00d4ff;margin:12px 0 16px;text-shadow:0 0 20px rgba(0,212,255,.3)}
    .product .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.3),transparent);margin:0 0 16px}
    .product .primary{width:100%;background:linear-gradient(135deg,#0891ff,#00d4ff);border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;color:#fff;box-shadow:0 8px 24px rgba(0,212,255,.25);transition:all .2s}
    .product .primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,212,255,.35)}
    .product.unavailable{opacity:.4;filter:saturate(.3)}
    .product.unavailable:before{content:"AGOTADO";position:absolute;z-index:5;right:14px;top:14px;background:rgba(239,68,68,.9);color:#fff;border-radius:10px;padding:6px 12px;font-size:11px;font-weight:1000;backdrop-filter:blur(8px)}
    .product .tag{position:absolute;left:14px;top:14px;z-index:2;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);font-size:10px;padding:4px 8px}
    body.dark .product .tag{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}
    .netflix{--accent:#ef1437}.prime{--accent:#00b8ff}.max{--accent:#7c3aed}
    .disney{--accent:#0a74ff}.spotify{--accent:#1db954}.youtube{--accent:#ff0033}.other{--accent:#7aa6c8}
    .tag{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;background:#e9f9f0;color:#087a35;font-size:11px;font-weight:1000;transition:all .15s ease}
    .tag.warn{background:#fff6d8;color:#8a5b00}.tag.bad{background:#ffe8e8;color:#b91c1c}
    .tag.personal{background:#ede9fe;color:#6d28d9}
    .tag.sharable{background:#e0f2fe;color:#0369a1}
    .price{font-size:22px;font-weight:1000;margin:8px 0 2px}
    .mini{font-size:11px;color:var(--muted)}
    .product .primary,.product .ghost{width:100%;margin-top:10px}

    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);-webkit-overflow-scrolling:touch;background:var(--panel)}
    table{width:100%;border-collapse:collapse;min-width:800px}
    th,td{padding:14px 16px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
    th{font-size:11px;color:var(--muted);background:var(--soft);text-transform:uppercase;font-weight:800;position:sticky;top:0;z-index:1;letter-spacing:.05em}
    td{font-size:13px;color:var(--text)}
    tr{transition:background .15s}
    tr:hover{background:rgba(8,119,255,.03)}
    body.dark tr:hover{background:rgba(8,119,255,.06)}
    .op-id{font-weight:800;color:var(--blue);font-size:12px}
    .op-product{display:flex;align-items:center;gap:10px}
    .op-product-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
    .op-product-icon svg{width:24px;height:24px}
    .op-product-name{font-weight:700;font-size:13px}
    .op-product-sub{font-size:11px;color:var(--muted)}
    .op-user{display:flex;align-items:center;gap:8px}
    .op-user svg{width:16px;height:16px;stroke:var(--muted);flex-shrink:0}
    .op-date{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
    .op-date svg{width:14px;height:14px;stroke:var(--muted)}
    .op-amount{font-weight:900;font-size:14px}
    .status-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:800}
    .status-badge.completed{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2)}
    .status-badge.pending{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
    .status-badge.failed{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
    .status-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
    .op-action{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--soft);color:var(--blue);display:grid;place-items:center;cursor:pointer;transition:all .18s}
    .op-action:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
    td input{border:1px solid var(--line);border-radius:10px;padding:8px 9px;background:var(--soft);color:var(--text);width:110px;font-weight:800}
    body.dark td input{background:rgba(18,37,59,.7);color:var(--text);border-color:#1e3652}
    td input:disabled{opacity:.5}
    .row-actions{display:flex;gap:7px;flex-wrap:wrap}
    .split{grid-template-columns:1.2fr .8fr}
    .form{display:grid;gap:10px}
    .form label{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;gap:4px}
    .form input,.form select,.form textarea{width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 12px;background:var(--panel);color:var(--text);outline:none;font-size:14px;transition:border-color .2s,box-shadow .2s}
    body.dark .form input,body.dark .form select,body.dark .form textarea{background:rgba(18,37,59,.7);color:var(--text);border-color:#1e3652}
    body.dark .ops-toolbar input,body.dark .ops-toolbar select{background:rgba(18,37,59,.7);color:var(--text);border-color:#1e3652}
    body.dark td input{background:rgba(18,37,59,.7);color:var(--text);border-color:#1e3652}
    .form input:focus,.form select:focus,.form textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(8,119,255,.18)}
    .form textarea{min-height:90px;resize:vertical}
    .list{display:grid;gap:8px}
    .list-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);padding:12px;transition:all .18s ease}
    .list-row:hover{border-color:rgba(8,119,255,.25);box-shadow:0 4px 16px rgba(8,119,255,.06)}
    .list-row.compact-order{grid-template-columns:100px 1fr auto}
    .ops-toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-top:12px}
    .ops-toolbar input,.ops-toolbar select{border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 11px;background:var(--panel);color:var(--text);font-size:14px}
    body.dark .ops-toolbar input,body.dark .ops-toolbar select{background:rgba(18,37,59,.7);color:var(--text);border-color:#1e3652}
    .ops-toolbar input{min-width:220px;flex:1}
    .client-data{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
    .client-data span{background:var(--soft);border:1px solid var(--line);border-radius:var(--radius-sm);padding:7px 9px;font-size:11px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .copy-box{background:var(--soft);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px;font-weight:800;word-break:break-word;font-size:13px}
    .modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(15,23,42,.5);backdrop-filter:blur(12px);z-index:30;padding:14px}
    .modal.show{display:grid}
    .dialog{width:min(580px,100%);max-height:90vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow2);padding:20px;animation:pop .25s cubic-bezier(.2,.8,.2,1)}
    .dialog-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
    .dialog-head h2{margin:0;font-size:20px}
    .close{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--soft);color:var(--text);font-weight:1000;font-size:16px;transition:all .18s}
    .close:hover{background:var(--bad);color:#fff;border-color:var(--bad)}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);opacity:0;background:#071526;color:#fff;border-radius:var(--radius);padding:12px 18px;box-shadow:0 14px 28px rgba(0,0,0,.25);transition:all .25s cubic-bezier(.2,.8,.2,1);z-index:50;font-weight:900;font-size:14px;display:flex;align-items:center;gap:8px}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{background:#075c32}.toast.ok::before{content:"✓"}.toast.bad{background:#8b1c1c}.toast.bad::before{content:"✕"}
    .alerts-panel{position:fixed;right:18px;top:68px;width:min(380px,calc(100vw - 20px));background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow2);padding:12px;z-index:25;display:none}
    .alerts-panel.show{display:grid;gap:8px;animation:pop .15s ease}
    .success-pulse{display:grid;place-items:center;margin:6px auto 14px;width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,#e8fff2,#c7f7db);color:var(--ok);font-size:34px;animation:pulse 1s ease-out 2}
    .admin-action{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:var(--radius);background:var(--soft);padding:11px;transition:all .18s ease}
    .admin-action:hover{border-color:rgba(8,119,255,.25);box-shadow:0 4px 16px rgba(8,119,255,.06)}
    .admin-action svg{width:22px;height:22px;stroke:var(--blue)}
    .admin-action b{display:block;font-size:14px}
    .admin-action .ghost,.admin-action .primary{min-width:100px;font-size:13px}
    .report-status{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
    .status-chip{border:1px solid var(--line);background:var(--soft);border-radius:var(--radius);padding:9px;font-size:11px;font-weight:900}
    .status-chip b{display:block;font-size:17px}
    .pay-card{display:grid;grid-template-columns:100px 1fr;gap:12px;align-items:center;background:linear-gradient(135deg,#fff,#eef7ff);border:1px solid var(--line);border-radius:var(--radius);padding:11px}
    body.dark .pay-card{background:rgba(18,37,59,.6)}
    .pay-card img{width:100%;border-radius:10px}

    .limit-bar{height:6px;border-radius:999px;background:var(--soft);overflow:hidden;margin-top:4px}
    .limit-bar-fill{height:100%;border-radius:999px;transition:.3s}
    .limit-bar-fill.ok{background:var(--ok)}.limit-bar-fill.warn{background:var(--warn)}.limit-bar-fill.bad{background:var(--bad)}
    .alert-card{border-left:3px solid var(--warn);background:var(--soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 12px;margin-top:8px}
    .alert-card.danger{border-left-color:var(--bad)}
    .alert-card.info{border-left-color:var(--blue)}
    .pwa-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);padding:14px 18px;z-index:45;box-shadow:0 -8px 24px rgba(0,0,0,.12);align-items:center;justify-content:space-between;gap:12px}
    .pwa-banner.show{display:flex}
    .analytics-card{border:1px solid var(--line);border-radius:var(--radius);padding:14px;background:var(--panel)}
    .analytics-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
    .analytics-row:last-child{border-bottom:none}

    @keyframes pop{from{transform:translateY(12px) scale(.98);opacity:0}to{transform:none;opacity:1}}
    @keyframes pulse{to{box-shadow:0 0 0 22px rgba(18,164,84,0)}}
    @keyframes loginIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
    @keyframes heroIn{from{opacity:0;transform:translateX(-16px) scale(.985)}to{opacity:1;transform:none}}

    @media(max-width:1020px){
      .login{grid-template-columns:1fr;padding:16px}
      .login-visual{display:none}
      .login-panel{padding:28px 20px}
      .login-panel h1{font-size:30px}
      .app{grid-template-columns:1fr}
      .side{position:fixed;left:0;right:0;bottom:0;top:auto;height:auto;z-index:20;padding:6px;border-top:1px solid var(--line);border-right:0;border-radius:var(--radius) var(--radius) 0 0;background:var(--panel)}
      body.dark .side{background:rgba(13,29,49,.95)}
      .side-brand,.profile-card,.nav-title{display:none}
      .nav{display:flex;overflow-x:auto;gap:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .nav::-webkit-scrollbar{display:none}
      .nav button{min-width:76px;justify-content:center;flex-direction:column;font-size:10px;padding:8px 6px;gap:3px;min-height:48px}
      .nav button svg{width:20px;height:20px}
      .main{padding:14px 12px 80px}
      .top{flex-direction:column;align-items:flex-start}
      .top-actions{width:100%;justify-content:flex-start}
      .quick,.metrics,.split{grid-template-columns:1fr}
      .store-grid{grid-template-columns:repeat(2,1fr)}
      .list-row.compact-order{grid-template-columns:1fr}
      .client-data{grid-template-columns:1fr 1fr}
      .quick-intro{padding:6px}
      .quick-btn{min-height:68px;font-size:12px}
      .product h3{font-size:14px}
      .poster{height:118px}
      .report-status{grid-template-columns:repeat(2,1fr)}
      .admin-action{grid-template-columns:36px 1fr}
      .admin-action .ghost,.admin-action .primary{grid-column:1/-1;width:100%}
      .ops-toolbar{flex-direction:column;align-items:stretch}
      .ops-toolbar input{min-width:0}
      .toast{bottom:auto;top:16px}
    }
    @media(max-width:560px){
      .store-grid{grid-template-columns:1fr}
      .pill{font-size:12px;padding:6px 10px}
      .top-actions .ghost.danger-btn{display:none}
      .client-data{grid-template-columns:1fr}
      .pay-card{grid-template-columns:70px 1fr}
      .dialog{padding:16px}
      .card{padding:14px}
      .metrics{grid-template-columns:repeat(2,1fr)}
      .report-status{grid-template-columns:1fr 1fr}
      .login-panel h1{font-size:26px}
      .login-panel>p{font-size:13px}
      .field{height:48px;padding:0 14px}
      .field input{font-size:14px}
    }

    /* ─── DARK MODE: OVERRIDE COMPLETO ─── */
    body.dark .pill{background:rgba(13,29,49,.95);border:1px solid rgba(59,130,246,.35);color:#eef6ff;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    body.dark .pill small{color:#93c5fd}
    body.dark .card{background:rgba(13,29,49,.85);border-color:#1e3652}
    body.dark .list-row{background:rgba(13,29,49,.85);border-color:#1e3652}
    body.dark .copy-box{background:rgba(18,37,59,.7);border-color:#1e3652;color:var(--text)}
    body.dark .admin-action{background:rgba(18,37,59,.6);border-color:#1e3652}
    body.dark .status-chip{background:rgba(18,37,59,.6);border-color:#1e3652}
    body.dark .analytics-card{background:rgba(18,37,59,.5);border-color:#1e3652}
    body.dark .analytics-row{border-color:#1e3652}
    body.dark .tag{background:rgba(18,60,40,.5);color:#6ee7a0}
    body.dark .tag.warn{background:rgba(80,50,10,.5);color:#fbbf24}
    body.dark .tag.bad{background:rgba(80,20,20,.5);color:#f87171}
    body.dark .tag.personal{background:rgba(50,20,80,.5);color:#c4b5fd}
    body.dark .tag.sharable{background:rgba(10,40,70,.5);color:#7dd3fc}
    body.dark .close{background:rgba(18,37,59,.7);border-color:#1e3652;color:var(--text)}
    body.dark .ghost{background:rgba(18,37,59,.6);border-color:#1e3652;color:var(--blue)}
    body.dark .ghost:hover{background:rgba(25,50,80,.7)}
    body.dark .profile-card{background:rgba(13,29,49,.85);border-color:#1e3652}
    body.dark .profile-card button{background:rgba(18,37,59,.7);border-color:#1e3652}
    body.dark .quick-btn{background:rgba(13,29,49,.85);border-color:#1e3652}
    body.dark .success-pulse{background:linear-gradient(135deg,rgba(18,164,84,.15),rgba(18,164,84,.08));color:#4ade80}
    body.dark .alert-card{background:rgba(18,37,59,.6);border-color:#1e3652}
    body.dark .alert-card.danger{border-left-color:#ef4444}
    body.dark .alert-card.info{border-left-color:#0877ff}
    body.dark .limit-bar{background:rgba(18,37,59,.7)}
    body.dark .product-body{color:var(--text)}
    body.dark .client-data span{background:rgba(18,37,59,.6);border-color:#1e3652;color:var(--text)}
    body.dark .report-status .status-chip{background:rgba(18,37,59,.6);border-color:#1e3652}
    body.dark .pwa-banner{background:rgba(13,29,49,.95);border-color:#1e3652}
    body.dark .top h1{color:var(--text)}
    body.dark .top p{color:var(--muted)}
    body.dark .card h2{color:var(--text)}
    body.dark .side-brand b{color:var(--text)}
    body.dark .notice-dot{background:#0877ff}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="modal" class="modal"></div>
  <div id="alerts" class="alerts-panel"></div>
  <div id="toast" class="toast"></div>
  <div id="pwa-banner" class="pwa-banner">
    <div><b>Instalar Distrito Streaming</b><br><span class="muted">Acceso rapido desde tu pantalla de inicio.</span></div>
    <div style="display:flex;gap:8px">
      <button class="ghost" onclick="closePwaBanner()">Ahora no</button>
      <button class="primary" onclick="installPwa()">Instalar</button>
    </div>
  </div>
  <script>
    // ─── CONFIG ────────────────────────────────────────
    const API = "https://tavfcrekyxnwrohsmncx.supabase.co/functions/v1/distrito-api";
    const ASSETS = "assets/";
    const PAYMENT_LINK = "https://checkout.nequi.wompi.co/l/VPOS_U68ZNz";
    const PAYMENT_NUMBER = "3102765347";
    const PROFIT_RATE = 0.20;
    const MAX_OPERATORS_PER_PRODUCT = 2;
    let token = localStorage.dsToken || "";
    let state = emptyState();
    let currentRole = localStorage.dsLoginRole || "Usuario";
    let deferredPrompt = null;

    function emptyState(){
      return { user:null, products:[], orders:[], reports:[], topups:[], ads:[], users:[], notifications:[], view:"home" };
    }
    const $ = (s,root=document) => root.querySelector(s);
    const money = n => "$ " + Number(n || 0).toLocaleString("es-CO");
    const initials = n => String(n || "U").split(" ").filter(Boolean).map(x=>x[0]).join("").slice(0,2).toUpperCase();
    const isAdmin = () => state.user && state.user.role === "Administrador";
    const isClient = () => state.user && state.user.role === "Cliente";
    const isReseller = () => state.user && state.user.role === "Revendedor";
    const publicRole = () => isAdmin() ? "Administrador" : isClient() ? "Cliente" : isReseller() ? "Revendedor" : "Usuario";

    const icons = {
      home:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m3 10 9-7 9 7'/><path d='M5 10v10h14V10'/><path d='M9 20v-6h6v6'/></svg>",
      store:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 2h12l2 7H4l2-7Z'/><path d='M5 9v11h14V9'/><path d='M9 13h6'/></svg>",
      orders:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='5' y='3' width='14' height='18' rx='2'/><path d='M9 7h6M9 12h6M9 17h3'/></svg>",
      reports:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M10.3 3.6 2.8 18a2 2 0 0 0 1.8 3h14.8a2 2 0 0 0 1.8-3L13.7 3.6a2 2 0 0 0-3.4 0Z'/><path d='M12 9v4M12 17h.01'/></svg>",
      ads:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m22 2-7 20-4-9-9-4 20-7Z'/><path d='M22 2 11 13'/></svg>",
      users:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2'/><circle cx='9' cy='7' r='4'/><path d='M22 21v-2a4 4 0 0 0-3-3.87'/><path d='M16 3.13a4 4 0 0 1 0 7.75'/></svg>",
      payments:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='5' width='18' height='14' rx='2'/><path d='M3 10h18'/></svg>",
      admin:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m12 2 3 7 7 .6-5.3 4.7 1.6 7-6.3-3.7-6.3 3.7 1.6-7L2 9.6 9 9l3-7Z'/></svg>",
      bell:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9'/><path d='M13.7 21a2 2 0 0 1-3.4 0'/></svg>",
      wallet:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 7H5a2 2 0 0 0 0 4h15v8H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16v4Z'/><path d='M16 14h.01'/></svg>",
      moon:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z'/></svg>",
      mail:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='5' width='18' height='14' rx='2'/><path d='m3 7 9 6 9-6'/></svg>",
      lock:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='4' y='10' width='16' height='10' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/></svg>",
      cart:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='9' cy='21' r='1'/><circle cx='20' cy='21' r='1'/><path d='M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6'/></svg>",
      copy:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='9' y='9' width='13' height='13' rx='2'/><path d='M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1'/></svg>",
      download:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4'/><polyline points='7 10 12 15 17 10'/><line x1='12' y1='15' x2='12' y2='3'/></svg>",
      link:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71'/><path d='M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71'/></svg>",
      chart:"<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 20V10'/><path d='M12 20V4'/><path d='M6 20v-6'/></svg>"
    };

    // ─── API ───────────────────────────────────────────
    async function api(path,opt={}){
      const res = await fetch(API + "/" + path, {
        ...opt,
        headers: {"Content-Type":"application/json", ...(token ? {"x-distrito-session":token} : {}), ...(opt.headers || {})}
      });
      const json = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(json.error || "No se pudo conectar con el servidor");
      return json;
    }
    function toast(msg,type=""){
      const node=$("#toast"); node.textContent=msg; node.className="toast show " + type;
      setTimeout(()=>node.classList.remove("show"),2800);
    }
    function serviceClass(name=""){
      const n=name.toLowerCase();
      if(n.includes("netflix"))return"netflix"; if(n.includes("prime"))return"prime"; if(n.includes("max")||n.includes("hbo"))return"max";
      if(n.includes("disney"))return"disney"; if(n.includes("spotify"))return"spotify"; if(n.includes("youtube"))return"youtube"; return"other";
    }
    function serviceName(name=""){return String(name).replace(/pantalla|semi|estandar|premium|dispositivo|1m/ig,"").trim().split(/\s+/).slice(0,2).join(" ") || name;}

    // ─── PRECIOS Y GANANCIA ────────────────────────────
    function salePrice(p){
      const provider = Number(p.provider_price ?? p.base_price ?? 0);
      const base = Number(p.base_price ?? provider);
      if(isAdmin()) return base;
      const margin = Number(state.user?.margin ?? 0);
      return provider + Math.max(0, margin);
    }
    function profitFromRecharge(amount){ return Math.round(amount * PROFIT_RATE); }

    // ─── CONTROLES ─────────────────────────────────────
    function daysLeft(date){
      if(!date)return null;
      const today=new Date(); today.setHours(0,0,0,0);
      const end=new Date(date+"T00:00:00"); return Math.ceil((end-today)/86400000);
    }
    function operatorCount(productId){
      return state.orders.filter(o => {
        const left = daysLeft(o.expires_at);
        const status = String(o.status||"").toLowerCase();
        return o.product_id === productId && (left === null || left >= 0 || status.includes("pend") || status.includes("proces"));
      }).length;
    }
    function canBuyProduct(p){
      if(p.shared === false || String(p.share_type||"").toLowerCase() === "personal") {
        return operatorCount(p.id) < 1;
      }
      return operatorCount(p.id) < MAX_OPERATORS_PER_PRODUCT;
    }

    // ─── MENSAJES ──────────────────────────────────────
    function formatOrderMessage(o,kind="datos"){
      const left=daysLeft(o.expires_at);
      if(kind==="renovar") return `Hola buen dia, queremos informarte que tu cuenta esta por vencer:\n\nProducto: ${o.product_name}\nCuenta: ${o.delivered_data || "-"}\nFecha de vencimiento: ${o.expires_at || "-"}\nVence en: ${left ?? "-"} dias\n\nSi deseas continuar, comunicate con nosotros.`;
      if(kind==="compra") return `Estos son los datos de tu pedido:\n\nProducto: ${o.product_name}\nCuenta: ${o.delivered_data || "-"}\nFecha de vencimiento: ${o.expires_at || "-"}\n\nGracias por tu compra.`;
      return `Claro que si, estos son tus datos:\n\nProducto: ${o.product_name}\nCuenta: ${o.delivered_data || "-"}\nFecha de vencimiento: ${o.expires_at || "-"}\nVence en: ${left ?? "-"} dias\n\nCualquier duda quedamos atentos.`;
    }

    // ─── LOGIN ─────────────────────────────────────────
    function renderLogin(){
      document.body.className = localStorage.dsDark === "1" ? "dark" : "";
      $("#root").innerHTML = `<main class="login app-bg">
        <section class="login-visual"><img src="${ASSETS}distrito-login-brand.png" alt="Distrito Streaming"></section>
        <section class="login-panel">
          <div class="login-brand"><img class="brand-logo" src="${ASSETS}distrito-angel-blue-v1.png" alt=""><div class="brand-title">DISTRITO<em>Streaming</em></div></div>
          <h1>Bienvenido <span>de nuevo</span></h1>
          <p>Accede a tu panel de ventas y gestiona tus cuentas con total control.</p>
          <div class="role-title">ROL DE ACCESO</div>
          <div class="role-toggle">
            <button class="${currentRole==="Usuario"?"active":""}" onclick="setLoginRole('Usuario')"><span>US</span> Usuario</button>
            <button class="${currentRole==="Administrador"?"active":""}" onclick="setLoginRole('Administrador')"><span>AD</span> Administrador</button>
          </div>
          <label class="field">${icons.mail}<input id="email" placeholder="Correo o usuario" autocomplete="username" value="${currentRole==="Administrador" ? "vargasblancobrayan@gmail.com" : ""}"></label>
          <label class="field">${icons.lock}<input id="password" placeholder="Contrasena" type="password" autocomplete="current-password"></label>
          <div class="login-options"><label class="check"><input type="checkbox" checked> Recordarme</label><a href="#">Olvidaste tu contrasena?</a></div>
          <button class="primary" onclick="login()">Ingresar al sistema <span>&rarr;</span></button>
          <div class="secure">Acceso seguro y encriptado</div>
        </section>
      </main>`;
    }
    function setLoginRole(role){currentRole=role;localStorage.dsLoginRole=role;renderLogin()}
    async function login(){
      try{
        const email=$("#email").value.trim(), password=$("#password").value;
        if(!email || !password) return toast("Ingresa correo y contrasena","bad");
        const res=await api("login",{method:"POST",body:JSON.stringify({email,password})});
        token=res.token || res.session; localStorage.dsToken=token; state.user=res.user;
        await boot(); toast("Bienvenido, " + state.user.name,"ok");
      }catch(e){toast(e.message,"bad")}
    }
    async function boot(){
      const res=await api("bootstrap");
      state={...emptyState(),...res,view:state.view || "home"};
      if(!state.user) throw new Error("Sesion invalida");
      normalizeViewForRole();
      renderApp();
      checkBalanceAlerts();
    }
    function logout(){localStorage.removeItem("dsToken");token="";state=emptyState();renderLogin()}
    function normalizeViewForRole(){
      const allowed = navItems().map(([view])=>view);
      if(!allowed.includes(state.view)) state.view = isAdmin() ? "admin" : "home";
    }

    // ─── ALERTAS DE SALDO ──────────────────────────────
    function checkBalanceAlerts(){
      if(!isAdmin()) return;
      const bal = Number(state.user?.balance || 0);
      if(bal < 10000) toast("Saldo bajo: " + money(bal) + ". Recarga pronto.", "bad");
      else if(bal < 30000) toast("Saldo: " + money(bal) + ". Considera recargar.", "ok");
    }

    // ─── NAVEGACION ────────────────────────────────────
    function navItems(){
      if(isAdmin()) return [
        ["admin","Panel",icons.admin],["users","Usuarios",icons.users],["store","Inventario",icons.store],
        ["payments","Pagos",icons.payments],["reports","Reportes",icons.reports],["ads","Publicidad",icons.ads],
        ["analytics","Estudios",icons.chart]
      ];
      return [["home","Inicio",icons.home],["store","Tienda",icons.store],["orders","Compras",icons.orders],["reports","Soporte",icons.reports],["ads","Material",icons.ads]];
    }
    function setView(view){state.view=view;renderApp()}
    function pageTitle(){
      return ({home:"Inicio",store:isAdmin()?"Inventario":"Tienda",orders:"Mis compras",reports:"Reportes y soporte",ads:isAdmin()?"Publicidad":"Material de ventas",users:"Usuarios",payments:"Pagos",admin:"Panel administrador",analytics:"Estudio general"}[state.view]||"Distrito");
    }
    function pageSubtitle(){
      if(isAdmin()) return "Control administrativo completo de usuarios, saldos, pagos, inventario e ingresos.";
      return "Compra, gestiona tus cuentas, reporta y recarga saldo desde un solo lugar.";
    }
    function renderApp(){
      document.body.className = localStorage.dsDark === "1" ? "dark" : "";
      if(!state.user) return renderLogin();
      const u=state.user, unread=state.notifications.filter(n=>!n.read_at).length;
      $("#root").innerHTML = `<div class="app app-bg">
        <aside class="side">
          <div class="side-brand"><img src="${ASSETS}distrito-angel-blue-v1.png" alt=""><div><b>Distrito</b><em>Streaming</em></div></div>
          <div class="nav-title">Navegacion</div>
          <nav class="nav">${navItems().map(([v,t,svg])=>`<button class="${state.view===v?"active":""}" onclick="setView('${v}')">${svg}<span>${t}</span></button>`).join("")}</nav>
          <div class="profile-card">
            <div class="avatar">${initials(u.name)}</div>
            <div style="min-width:0;overflow:hidden"><b style="font-size:13px">${u.name}</b><br><small class="muted" style="font-size:11px">${u.email}</small><br><span class="tag">${publicRole()}</span></div>
            <button title="Perfil" onclick="openProfile()" style="font-size:14px">v</button>
          </div>
        </aside>
        <main class="main">
          <header class="top">
            <div><h1>${pageTitle()}</h1><p>${pageSubtitle()}</p></div>
            <div class="top-actions">
              ${!isAdmin()?`<button class="pill" onclick="openTopup()"><span class="mini-ico">${icons.wallet}</span><span><small>Saldo</small>${money(u.balance)}</span></button>`:`<button class="pill"><span class="mini-ico">${icons.wallet}</span><span><small>Saldo admin</small>${money(u.balance)}</span></button>`}
              <button class="pill" onclick="toggleAlerts(event)"><span class="mini-ico">${icons.bell}</span>Avisos <span class="notice-dot">${unread}</span></button>
              <button class="ghost" title="${localStorage.dsDark==="1"?"Modo claro":"Modo oscuro"}" onclick="toggleDark()" style="display:flex;align-items:center;gap:6px;padding:8px 12px">${localStorage.dsDark==="1"?`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;stroke:var(--blue)"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`:`${icons.moon}`} ${localStorage.dsDark==="1"?"Claro":"Oscuro"}</button>
              <button class="danger-btn" onclick="logout()">Salir</button>
            </div>
          </header>
          ${renderView()}
        </main>
      </div>`;
    }
    function renderView(){
      return ({home,store,orders,reports,ads,users,payments,admin,analytics}[state.view] || home)();
    }

    // ─── HOME ──────────────────────────────────────────
    function home(){
      const rows=activeOrders().slice(0,4);
      return `<section class="card">
        <div class="grid quick">
          <div class="quick-intro"><h2>Operacion diaria</h2><p class="muted">Acciones rapidas para vender y resolver.</p></div>
          ${quickButton("store",icons.cart,"Nueva compra","primary-q")}
          ${quickButton("orders",icons.copy,"Copiar datos")}
          ${quickButton("reports",icons.reports,"Reportar falla")}
          ${quickButton("topup",icons.wallet,"Recargar saldo")}
        </div>
      </section>
      ${isAdmin()?balanceAlertCard(): ""}
      <section class="card section">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
          <div><h2>Operacion reciente</h2><p class="muted">Compras vigentes o pendientes.</p></div>
          <button class="ghost" onclick="setView('orders')">Ver historial</button>
        </div>
        <div class="list section">${orderRows(rows,true)}</div>
      </section>`;
    }
    function balanceAlertCard(){
      const bal = Number(state.user?.balance || 0);
      if(bal > 30000) return "";
      const cls = bal < 10000 ? "danger" : "info";
      const msg = bal < 10000 ? "Saldo critico. Recarga urgente para seguir vendiendo." : "Saldo bajo. Considera recargar pronto.";
      return `<section class="alert-card ${cls}"><b>${msg}</b> Saldo actual: ${money(bal)}</section>`;
    }
    function quickButton(target,svg,label,cls=""){
      const click=target==="topup"?"openTopup()":`setView('${target}')`;
      return `<button class="quick-btn ${cls}" onclick="${click}">${svg}<span>${label}</span></button>`;
    }

    // ─── ADMIN PANEL ───────────────────────────────────
    function admin(){
      const pendingTopups=state.topups.filter(t=>t.status==="Pendiente").length;
      const openReports=state.reports.filter(r=>r.status!=="Resuelto").length;
      const activeUsers=state.users.filter(u=>(u.status||"Activo")==="Activo").length;
      const totalProfit = state.topups.filter(t=>t.status==="Aprobada").reduce((s,t)=>s+profitFromRecharge(Number(t.amount||0)),0);
      return `<section class="grid metrics">
        ${metric("Operaciones",activeOrders().length,icons.cart)}
        ${metric("Usuarios activos",activeUsers,icons.users)}
        ${metric("Pagos pendientes",pendingTopups,icons.payments)}
        ${metric("Ganancia neta",money(totalProfit),icons.wallet)}
      </section>
      <section class="grid split section">
        <div class="card"><h2>Control de operacion</h2><p class="muted">Vista compacta de las operaciones activas.</p><div class="list section">${orderRows(activeOrders().slice(0,6),true)}</div></div>
        <div class="card"><h2>Acciones admin</h2><p class="muted">Gestiona todo desde aqui.</p><div class="grid section">
          <div class="admin-action">${icons.users}<div><b>Usuarios</b><span class="muted">Crear administradores, revendedores y clientes.</span></div><button class="primary" onclick="setView('users')">Gestionar</button></div>
          <div class="admin-action">${icons.payments}<div><b>Recargas</b><span class="muted">${pendingTopups} pagos esperan aprobacion.</span></div><button class="ghost" onclick="setView('payments')">Revisar</button></div>
          <div class="admin-action">${icons.ads}<div><b>Publicidad</b><span class="muted">Subir piezas y notificar usuarios.</span></div><button class="ghost" onclick="setView('ads')">Publicar</button></div>
          <div class="admin-action">${icons.link}<div><b>Links de registro</b><span class="muted">Crear links para revendedores o clientes.</span></div><button class="ghost" onclick="openShareLinks()">Generar</button></div>
        </div></div>
      </section>`;
    }
    function metric(label,value,svg){return `<article class="card metric"><span class="mini-ico">${svg}</span><div><span class="muted">${label}</span><br><b>${value}</b></div></article>`}

    // ─── TIENDA / INVENTARIO ───────────────────────────
    function store(){
      const sorted=[...state.products].sort((a,b)=>(b.status==="Disponible")-(a.status==="Disponible") || Number(b.stock||0)-Number(a.stock||0));
      const available=sorted.filter(p=>p.status==="Disponible" && Number(p.stock)>0);
      const unavailable=sorted.filter(p=>!(p.status==="Disponible" && Number(p.stock)>0));
      const visible=isAdmin()?sorted:available;
      return `<section class="card" style="padding:12px 14px">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap">
          <div><b>${isAdmin()?"Inventario del proveedor":"Productos disponibles"}</b><p class="muted" style="margin:3px 0 0">${isAdmin()?"Administra stock, precios y tipo de pantalla (compartida/personal).":"Solo ves productos con stock para comprar."}</p></div>
          <span class="tag">${available.length} disponibles</span>
        </div>
      </section>
      <section class="grid store-grid section">${visible.map(productCard).join("") || "<p class='muted'>No hay productos disponibles ahora.</p>"}</section>
      ${isAdmin()&&unavailable.length?`<section class="card section"><h2>Agotados o pausados</h2><div class="grid store-grid section">${unavailable.map(productCard).join("")}</div></section>`:""}`;
    }
    function productCard(p){
      const available=p.status==="Disponible" && Number(p.stock)>0;
      const canBuy = canBuyProduct(p);
      const cls=serviceClass(p.name), price=salePrice(p);
      const isPersonal = p.shared === false || String(p.share_type||"").toLowerCase() === "personal";
      const ops = operatorCount(p.id);
      const logos = {
        netflix:`<div style="width:120px;height:60px;background:#E50914;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;color:#fff;font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:2px">N</div>`,
        spotify:`<div style="width:80px;height:80px;background:#1DB954;border-radius:50%;display:flex;align-items:center;justify-content:center"><svg width="40" height="40" viewBox="0 0 24 24" fill="#000"><path d="M6 15c-.2 0-.4-.1-.6-.2-.5-.3-.6-.9-.3-1.4 1.7-3 5.2-3.9 8.4-2.7.5.2.7.8.5 1.3-.2.5-.8.7-1.3.5-2.3-.8-5.3-.2-6.9 2.1-.3.4-.8.6-1.2.5l1.4.4zM14.3 12.3c-.2 0-.3-.1-.5-.2-1.2-1.8-3.7-2.3-5.9-1.6-.5.2-.9-.1-1.1-.5-.2-.5.1-.9.5-1.1 2.7-.8 5.7-.3 7.3 2 .4.5.2 1.1-.4 1.4z"/><path d="M16 10.5c-.2 0-.3 0-.5-.1-1.5-2.4-4.5-3-6.8-2.1-.5.2-1.1-.1-1.3-.6-.2-.5.1-1.1.6-1.3 2.8-1 6.2-.4 8.1 2.4.5.6.2 1.2-.5 1.5-.1.1-.3.2-.6.2z"/></svg></div>`,
        max:`<div style="width:120px;height:60px;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;color:#fff;font-family:'Arial',sans-serif;letter-spacing:2px">max</div>`,
        prime:`<div style="width:120px;height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1"><span style="font-size:22px;font-weight:700;color:#00A8E1;font-family:'Arial',sans-serif">prime</span><span style="font-size:16px;color:#fff;font-family:'Arial',sans-serif">video</span><svg width="80" height="8" viewBox="0 0 80 8"><path d="M0 6 Q40 0 80 6" stroke="#00A8E1" stroke-width="2" fill="none"/></svg></div>`,
        disney:`<div style="width:120px;height:60px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;font-family:'Arial',sans-serif">Disney+</div>`,
        youtube:`<div style="width:80px;height:60px;display:flex;align-items:center;justify-content:center"><div style="width:60px;height:40px;background:#FF0000;border-radius:12px;display:flex;align-items:center;justify-content:center"><div style="width:0;height:0;border-left:18px solid #fff;border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:4px"></div></div></div>`,
        other:`<div style="width:60px;height:60px;background:#7AA6C8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff">?</div>`
      };
      const logo = logos[cls] || logos.other;
      return `<article class="product ${available?"":"unavailable"}">
        <div class="poster ${cls}">
          <span class="tag">${isPersonal?"Personal":"1 Mes"}</span>
          <span class="stock">${available?p.stock+" disp.":"Agotado"}</span>
          <div class="logo-word">${logo}</div>
        </div>
        <div class="product-body">
          <h3>${serviceName(p.name)}</h3>
          <span class="mini">${isPersonal?"1 operador por cuenta":`${MAX_OPERATORS_PER_PRODUCT} operadores max.`}</span>
          <div class="price">${money(price)}</div>
          <div class="divider"></div>
          ${available && canBuy?`<button class="primary" onclick="openBuy('${p.id}')">Comprar pantalla</button>`:
            available && !canBuy?`<button class="primary" disabled style="opacity:.5">Limite alcanzado</button>`:
            `<button class="primary" disabled style="opacity:.5">Agotado</button>`}
        </div>
      </article>`;
    }
    function openBuy(id){
      const p=state.products.find(x=>x.id===id); if(!p) return;
      const max=Math.max(1,Math.min(10,Number(p.stock||1))), price=salePrice(p);
      const isPersonal = p.shared === false || String(p.share_type||"").toLowerCase() === "personal";
      const ops = operatorCount(p.id);
      const maxAllowed = isPersonal ? Math.max(0, 1 - ops) : Math.max(0, MAX_OPERATORS_PER_PRODUCT - ops);
      const maxQty = Math.min(max, maxAllowed);
      if(maxQty <= 0) return toast("Ya alcanzaste el limite de operadores para este producto.","bad");
      openModal(`<div class="dialog-head"><div><small class="muted">CONFIRMAR COMPRA</small><h2>${p.name}</h2><p class="muted">Elige cantidad y confirma.</p></div><button class="close" onclick="closeModal()">&times;</button></div>
        <div class="form">
          <label>Cantidad<select id="buyQty" onchange="updateBuyTotal(${price})">${Array.from({length:maxQty},(_,i)=>`<option value="${i+1}">${i+1} pantalla${i?"s":""}</option>`).join("")}</select></label>
          ${isPersonal?`<div class="alert-card info">Pantalla personal: solo 1 operador por cuenta.</div>`:`<div class="alert-card info">${ops}/${MAX_OPERATORS_PER_PRODUCT} operadores en uso. Maximo ${maxAllowed} mas.</div>`}
          <div class="copy-box"><b>Total a pagar</b><span style="float:right;font-size:22px" id="buyTotal">${money(price)}</span></div>
          <div id="buyState" class="tag">Listo para comprar</div>
          <div class="row-actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="ok-btn" onclick="finishBuy('${id}')">Comprar ahora</button></div>
        </div>`);
      updateBuyTotal(price);
    }
    function updateBuyTotal(price){
      const qty=Number($("#buyQty")?.value||1), total=qty*price, bal=Number(state.user?.balance||0);
      $("#buyTotal").textContent=money(total);
      const ok=bal>=total || isAdmin();
      $("#buyState").className=ok?"tag":"tag bad";
      $("#buyState").textContent=ok?`Listo para comprar ${qty} pantalla${qty>1?"s":""}.`:`Saldo insuficiente. Faltan ${money(total-bal)}.`;
    }
    async function finishBuy(id){
      try{
        const qty=Number($("#buyQty").value||1);
        const res=await api("buy",{method:"POST",body:JSON.stringify({product_id:id,quantity:qty})});
        const delivered = res.orders||[];
        state.orders=[...delivered,...state.orders];
        if(res.balance!==undefined) state.user.balance=res.balance;
        renderDelivery(delivered);
        await boot();
      }catch(e){toast(e.message,"bad")}
    }
    function renderDelivery(orders){
      if(!orders.length) return toast("Compra registrada, pero el proveedor no devolvio datos","bad");
      openModal(`<div class="success-pulse">OK</div><div class="dialog-head"><div><small class="muted">ENTREGA AUTOMATICA</small><h2>Datos listos</h2><p class="muted">Copia y envia al cliente. Quedara guardado en Mis compras.</p></div><button class="close" onclick="closeModal()">&times;</button></div>
      <div class="list">${orders.map(o=>`<div class="card"><b>${o.product_name}</b><div class="copy-box">${o.delivered_data||"Sin datos entregados"}</div><p class="mini">Vence ${o.expires_at||"-"}</p><div class="row-actions"><button class="primary" onclick="copyText(decodeOrderMessage('${safeOrder(o)}','compra'))">${icons.copy} Copiar mensaje</button><button class="ghost" onclick="openReport('${o.id}')">Reportar</button></div></div>`).join("")}</div>`);
    }

    // ─── ORDENES ───────────────────────────────────────
    function deliveryMessageById(id,kind){const o=state.orders.find(x=>x.id===id)||{};return formatOrderMessage(o,kind)}
    function activeOrders(){
      return state.orders.filter(o=>{
        const left=daysLeft(o.expires_at);
        const status=String(o.status||"").toLowerCase();
        return left===null || left>=0 || status.includes("pend") || status.includes("proces");
      });
    }
    function orders(){
      const rows=activeOrders();
      return `<section class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap">
          <div><h2>Mis compras</h2><p class="muted">Las vencidas finalizadas se archivan automaticamente.</p></div>
          <span class="tag">${rows.length} activas</span>
        </div>
        <div class="ops-toolbar">
          <input id="orderSearch" oninput="filterOrders()" placeholder="Buscar pedido, producto, cliente o cuenta">
          <select id="orderScope" onchange="filterOrders()"><option value="active">Activas</option><option value="all">Todas</option><option value="expired">Vencidas</option></select>
          <button class="ghost" onclick="exportOrdersCsv()">Exportar</button>
        </div>
        <div id="ordersList" class="list section">${orderRows(rows,false)}</div>
      </section>`;
    }
    function filterOrders(){
      const q=($("#orderSearch")?.value||"").toLowerCase(), scope=$("#orderScope")?.value||"active";
      let rows=scope==="all"?state.orders:scope==="expired"?state.orders.filter(o=>daysLeft(o.expires_at)<0):activeOrders();
      rows=rows.filter(o=>`${o.code} ${o.product_name} ${o.client_name} ${o.delivered_data}`.toLowerCase().includes(q));
      $("#ordersList").innerHTML=orderRows(rows,false);
    }
    function orderRows(rows,compact){
      if(!rows.length) return `<p class="muted">Sin registros todavia.</p>`;
      if(compact) {
        return rows.map(o=>{
          const left=daysLeft(o.expires_at), warning=left!==null && left<=5;
          return `<div class="list-row compact-order">
            <div><b>${o.code||"Orden"}</b></div>
            <div><b>${o.product_name}</b><br><span class="muted">${o.client_name||"Cliente"}</span></div>
            <div class="row-actions">
              <span class="tag ${warning?"bad":""}">${o.status||"Entregado"}${left!==null?` - ${left}d`: ""}</span>
              <button class="ghost" onclick="copyText(decodeOrderMessage('${safeOrder(o)}','datos'))">${icons.copy}</button>
            </div>
          </div>`;
        }).join("");
      }
      const serviceIcons = {netflix:"N",prime:"P",max:"M",disney:"D",spotify:"S",youtube:"Y",other:"O"};
      const serviceColors = {netflix:"#ef1437",prime:"#00b8ff",max:"#7c3aed",disney:"#0a74ff",spotify:"#1db954",youtube:"#ff0033",other:"#7aa6c8"};
      const serviceLogos = {
        netflix:`<div style="width:24px;height:24px;background:#E50914;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff">N</div>`,
        spotify:`<div style="width:24px;height:24px;background:#1DB954;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px">♫</div>`,
        max:`<div style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">max</div>`,
        prime:`<div style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#00A8E1">PV</div>`,
        disney:`<div style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff">D+</div>`,
        youtube:`<div style="width:24px;height:24px;background:#FF0000;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">▶</div>`,
        other:`<div style="width:24px;height:24px;background:#7AA6C8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">?</div>`
      };
      return `<div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Producto</th><th>Usuario</th><th>Fecha</th><th>Monto</th><th>Estado</th><th>Accion</th></tr></thead>
        <tbody>${rows.map(o=>{
          const left=daysLeft(o.expires_at);
          const cls=serviceClass(o.product_name);
          const icon=serviceIcons[cls]||"O";
          const color=serviceColors[cls]||"#7aa6c8";
          const logo=serviceLogos[cls]||serviceLogos.other;
          const statusClass=(o.status||"").includes("Pend")?"pending":(o.status||"").includes("Fall")?"failed":"completed";
          const statusText=o.status||"Entregado";
          return `<tr>
            <td><span class="op-id">${o.code||"#DS-0000"}</span></td>

    function parseAccount(text){
      const parts=String(text||"").split(":").map(x=>x.trim()).filter(Boolean);

    }
    function safeOrder(o){return encodeURIComponent(JSON.stringify({product_name:o.product_name,delivered_data:o.delivered_data,expires_at:o.expires_at}))}
    function decodeOrderMessage(encoded,kind){try{return formatOrderMessage(JSON.parse(decodeURIComponent(encoded)),kind)}catch{return ""}}
    function exportOrdersCsv(){
      const rows=state.orders.map(o=>[o.code,o.product_name,o.client_name,o.status,o.expires_at,o.delivered_data].map(csvCell).join(";")).join("\n");

        await api("ads",{method:"POST",body:JSON.stringify({title:$("#adTitle").value,short_text:$("#adCopy").value.slice(0,80),copy_text:copy,status:"Activa",file_name:file?.name||"",file_url:file?URL.createObjectURL(file):""})});

    function previewAdFile(){
      const file=$("#adFile").files[0], box=$("#adPreview");

      if(file.type.startsWith("image/")){
        const url=URL.createObjectURL(file);
        box.innerHTML=`<b>${file.name}</b> <span class="muted">(${(file.size/1024).toFixed(0)} KB)</span><br><img src="${url}" style="max-width:100%;border-radius:10px;margin-top:6px">`;
        setTimeout(()=>URL.revokeObjectURL(url),5000);
      } else {
        box.innerHTML=`<b>${file.name}</b> <span class="muted">(${(file.size/1024).toFixed(0)} KB)</span>`;
      }
      box.className="copy-box";

      const totalRevenue = state.orders.reduce((s,o)=>s+Number(o.amount||o.total||0),0);
      const totalTopups = state.topups.filter(t=>t.status==="Aprobada").reduce((s,t)=>s+Number(t.amount||0),0);
      const totalProfit = state.topups.filter(t=>t.status==="Aprobada").reduce((s,t)=>s+profitFromRecharge(Number(t.amount||0)),0);
      const pendingTopups = state.topups.filter(t=>t.status==="Pendiente");
      const openReports = state.reports.filter(r=>r.status!=="Resuelto");
      const closedReports = state.reports.filter(r=>r.status==="Resuelto");
      const activeUsers = state.users.filter(u=>(u.status||"Activo")==="Activo");
      const resellers = state.users.filter(u=>u.role==="Revendedor");
      const clients = state.users.filter(u=>u.role==="Cliente");
      const totalSales = state.orders.length;
      const avgTicket = totalSales > 0 ? Math.round(totalRevenue / totalSales) : 0;

      const productStats = {};
      state.orders.forEach(o => {
        const name = o.product_name || "Desconocido";
        if(!productStats[name]) productStats[name] = { count:0, revenue:0 };
        productStats[name].count++;
        productStats[name].revenue += Number(o.amount||o.total||0);
      });
      const topProducts = Object.entries(productStats).sort((a,b)=>b[1].count-a[1].count).slice(0,5);

      const expiringSoon = state.orders.filter(o => {
        const left = daysLeft(o.expires_at);
        return left !== null && left >= 0 && left <= 7;
      });

      return `
        <section class="grid metrics">
          ${metric("Ingresos totales",money(totalRevenue),icons.wallet)}
          ${metric("Recargas recibidas",money(totalTopups),icons.payments)}
          ${metric("Ganancia neta (20%)",money(totalProfit),icons.chart)}
          ${metric("Ticket promedio",money(avgTicket),icons.store)}

        <section class="grid split section">
          <div class="card">
            <h2>Resumen de operacion</h2>
            <p class="muted">Estudio general del negocio.</p>
            <div class="analytics-card" style="margin-top:10px">
              <div class="analytics-row"><span class="muted">Total ventas</span><b>${totalSales}</b></div>
              <div class="analytics-row"><span class="muted">Usuarios activos</span><b>${activeUsers.length}</b></div>
              <div class="analytics-row"><span class="muted">Revendedores</span><b>${resellers.length}</b></div>
              <div class="analytics-row"><span class="muted">Clientes</span><b>${clients.length}</b></div>
              <div class="analytics-row"><span class="muted">Compras activas</span><b>${activeOrders().length}</b></div>
              <div class="analytics-row"><span class="muted">Pantallas con limite de operador</span><b>${state.products.filter(p=>p.shared===false||String(p.share_type||"").toLowerCase()==="personal").length}</b></div>
              <div class="analytics-row"><span class="muted">Pagos pendientes</span><b style="color:var(--warn)">${pendingTopups.length}</b></div>
              <div class="analytics-row"><span class="muted">Reportes abiertos</span><b style="color:var(--bad)">${openReports.length}</b></div>
              <div class="analytics-row"><span class="muted">Reportes resueltos</span><b style="color:var(--ok)">${closedReports.length}</b></div>
            </div>
          </div>

          <div class="card">
            <h2>Productos mas vendidos</h2>
            <p class="muted">Top 5 por cantidad de ventas.</p>
            <div class="analytics-card" style="margin-top:10px">
              ${topProducts.length?topProducts.map(([name,stat])=>`
                <div class="analytics-row"><div><b>${name}</b><br><span class="mini">${stat.count} ventas</span></div><b>${money(stat.revenue)}</b></div>
              `).join(""):`<p class="muted">Sin datos de ventas aun.</p>`}
            </div>
          </div>
        </section>

        ${expiringSoon.length?`
        <section class="card section">
          <h2>Por vencer (7 dias)</h2>
          <p class="muted">Cuentas que vencen pronto. Considera contactar a los clientes.</p>
          <div class="list section">${expiringSoon.map(o=>{
            const left=daysLeft(o.expires_at);
            return `<div class="list-row"><div><b>${o.product_name}</b><br><span class="muted">${o.client_name||"Cliente"} - ${o.delivered_data||"-"}</span></div><div class="row-actions"><span class="tag bad">${left} dias</span><button class="ghost" onclick="copyText(decodeOrderMessage('${safeOrder(o)}','renovar'))">${icons.copy} Mensaje renovar</button></div></div>`;
          }).join("")}</div>
        </section>`:""}

        <section class="card section">
          <h2>Recomendaciones</h2>
          <p class="muted">Sugerencias automaticas basadas en el estado actual.</p>
          <div class="list section">
            ${pendingTopups.length>3?`<div class="alert-card danger"><b>${pendingTopups.length} recargas pendientes</b> - Revisa y aprueba lo mas pronto para mantener el flujo.</div>`:""}
            ${openReports.length>2?`<div class="alert-card"><b>${openReports.length} reportes abiertos</b> - Intenta resolver los reportes viejos primero.</div>`:""}
            ${Number(state.user?.balance||0)<20000?`<div class="alert-card danger"><b>Saldo bajo</b> - Tu saldo es ${money(state.user?.balance||0)}. Recarga para seguir vendiendo.</div>`:""}
            ${expiringSoon.length>0?`<div class="alert-card info"><b>${expiringSoon.length} cuentas por vencer</b> - Envia mensajes de renovacion a los clientes.</div>`:""}
            ${resellers.length===0?`<div class="alert-card info"><b>Sin revendedores</b> - Crea revendedores para ampliar tu red de ventas.</div>`:""}
            <div class="alert-card info"><b>Control de pantallas personales</b> - Spotify y servicios personales solo permiten 1 operador. Asegurate de configurar esto en el inventario.</div>
          </div>
        </section>`;
    }

    // ─── UTILIDADES ────────────────────────────────────
    function openProfile(){
      const u=state.user;
      openModal(`<div class="dialog-head"><div><small class="muted">CUENTA</small><h2>Mi perfil</h2></div><button class="close" onclick="closeModal()">&times;</button></div>
        <div class="list">
          <div class="list-row"><div class="avatar">${initials(u.name)}</div><div><b>${u.name}</b><br><span class="mini">${u.email}</span><br><span class="tag">${publicRole()}</span></div></div>
          ${!isAdmin()?`<div class="list-row"><div><b>Saldo disponible</b><p class="mini">Tu balance actual.</p></div><b>${money(u.balance)}</b></div>`:""}
          <div class="list-row"><div><b>Apariencia</b><p class="mini">Modo claro u oscuro.</p></div><button class="ghost" onclick="toggleDark()">Cambiar</button></div>
          <div class="list-row"><div><b>Sesion</b><p class="mini">Cerrar acceso en este dispositivo.</p></div><button class="danger-btn" onclick="logout()">Salir</button></div>
        </div>`);
    }
    function toggleDark(){localStorage.dsDark=localStorage.dsDark==="1"?"0":"1";renderApp()}
    function toggleAlerts(ev){
      ev?.stopPropagation();
      const panel=$("#alerts"), unread=state.notifications.filter(n=>!n.read_at).length;
      panel.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><b>Notificaciones</b><span class="notice-dot">${unread}</span></div><div class="list">${state.notifications.map(n=>`<div class="list-row" style="padding:10px"><div><b style="font-size:13px">${n.title}</b><p class="mini">${n.body||""}</p></div></div>`).join("")||"<p class='muted'>Sin avisos.</p>"}</div>`;
      panel.classList.toggle("show");
    }
    document.addEventListener("click",e=>{if(!e.target.closest("#alerts")&&!e.target.closest(".pill"))$("#alerts")?.classList.remove("show")});
    function openModal(html){$("#alerts").classList.remove("show");$("#modal").innerHTML=`<div class="dialog">${html}</div>`;$("#modal").classList.add("show")}
    function closeModal(){$("#modal").classList.remove("show")}
    function copyText(text){navigator.clipboard?.writeText(text).then(()=>toast("Copiado","ok")).catch(()=>toast("No se pudo copiar","bad"))}
    function escapeJs(text){return String(text||"").replaceAll("\\","\\\\").replaceAll("'","\\'").replaceAll("\n","\\n")}

    // ─── PWA ───────────────────────────────────────────
    window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;if(localStorage.dsPwaDismissed!=="1")document.getElementById("pwa-banner").classList.add("show")});
    function installPwa(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==="accepted")toast("App instalada","ok");deferredPrompt=null;closePwaBanner()})}
    function closePwaBanner(){document.getElementById("pwa-banner").classList.remove("show");localStorage.dsPwaDismissed="1"}
    if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));navigator.serviceWorker.register("sw.js").catch(()=>{})}

    // ─── INIT ──────────────────────────────────────────
    token ? boot().catch(()=>{localStorage.removeItem("dsToken");token="";renderLogin()}) : renderLogin();
  </script>
</body>
</html>
